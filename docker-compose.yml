version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hrms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hrms_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-time-zone=+05:30
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s
    networks:
      - hrms-network

  backend:
    build: .
    container_name: hrms-backend
    restart: unless-stopped
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - DB_NAME=hrms_db
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - hrms-network
    init: true

networks:
  hrms-network:
    driver: bridge
    name: hrms-network

volumes:
  mysql_data:
    driver: local