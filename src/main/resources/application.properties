spring.application.name=HRMS-System
server.port=8086

#bulk image acceptance size increases
server.tomcat.max-part-count=1000

# production (use env variables)
spring.main.lazy-initialization = true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET time_zone = '+05:30'
#spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true

## FIX ADDED
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

#Hibernate uses IST for all JDBC timestamp
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

#fevicon warn
spring.mvc.favicon.enabled=false
logging.level.org.springframework.web.servlet.resource=WARN

#NEW ADDED
#spring.jpa.properties.hibernate.query.passDistinctThrough=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging Configuration
logging.file.name=logs/hrms_backend_v1_0.log
logging.logback.rollingpolicy.max-file-size=25MB
logging.logback.rollingpolicy.max-history=10

# Enable Jackson/HTTP debug
logging.level.com.fasterxml.jackson=DEBUG
logging.level.org.springframework.web=DEBUG

spring.config.import=optional:file:.env[.properties]

# Optional: Remove dialect as Hibernate auto-detects it (per log warning)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#spring.jackson.serialization.write-dates-as-timestamps=false
#spring.jackson.deserialization.fail-on-unknown-properties=false

# Multipart settings (already suitable for Banner file uploads)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.enabled=true

# Tomcat settings
server.tomcat.max-http-form-post-size=100MB
server.tomcat.max-swallow-size=100MB
server.tomcat.max-connections=20000
server.tomcat.max-threads=200
server.tomcat.additional-tld-skip-patterns=*.jar

# proxy connection files transfer timing
server.tomcat.connection-timeout=120000
server.tomcat.max-keep-alive-requests=100
server.tomcat.keep-alive-timeout=120000


# JWT token expiration in milliseconds (1 hour = 3600000 ms) , (24hr = 86400000)
jwt.expiration=86400000
jwt.secret=${JWT_SECRET}


# SMTP Configuration for Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
